<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Ultra Premium</title>
    
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #3a86ff;
            --radius: 20px;
        }

        * { transition: all 0.3s ease; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: var(--text); overflow: hidden;
        }

        /* Sidebar */
        .sidebar { 
            width: 280px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1); padding: 30px 20px; 
            display: flex; flex-direction: column; gap: 10px;
        }
        .logo { font-size: 28px; font-weight: 900; background: linear-gradient(45deg, #00d2ff, #3a86ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; text-align: center; }
        
        .nav-btn { 
            padding: 14px 18px; cursor: pointer; border-radius: var(--radius); 
            border: 1px solid transparent; background: transparent; color: #94a3b8;
            font-weight: 600; text-align: left; display: flex; align-items: center; gap: 12px;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; transform: translateX(5px); }
        .nav-btn.active { background: var(--card); border-color: var(--primary); color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 20px; position: relative; }
        .tab-content { display: none; width: 100%; max-width: 800px; flex-direction: column; opacity: 0; transform: translateY(20px); }
        .tab-content.active { display: flex; animation: slideUp 0.5s forwards; }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* Cards */
        .card { background: var(--card); backdrop-filter: blur(15px); padding: 25px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        
        input, textarea { 
            width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; background: rgba(0,0,0,0.2); color: white; outline: none; margin-bottom: 12px;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,210,255,0.3); }

        .btn-main { background: linear-gradient(45deg, var(--primary), var(--accent)); color: white; border: none; padding: 14px; border-radius: 15px; cursor: pointer; font-weight: 700; width: 100%; }
        .btn-main:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Chat */
        .chat-area { flex: 1; height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 20px; border-radius: var(--radius); display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 75%; font-size: 15px; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .msg.mine { align-self: flex-end; background: var(--primary); color: #000; font-weight: 500; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        /* Admin */
        #nb-admin { border: 2px solid #6366f1; color: #818cf8; display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">BLVgramm</div>
        <button class="nav-btn active" id="nb-feed" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" id="nb-messages" onclick="showTab('messages')">💬 Сообщения</button>
        <button class="nav-btn" id="nb-users" onclick="showTab('users')">🔍 Люди</button>
        <button class="nav-btn" id="nb-cust" onclick="showTab('cust')">🎨 Тема</button>
        <button class="nav-btn" id="nb-prof" onclick="showTab('prof')">👤 Профиль</button>
        <button class="nav-btn" id="nb-admin" onclick="showTab('admin')">👑 Админка</button>
        <div style="margin-top:auto; font-size:11px; opacity:0.4; text-align:center;" id="myIdDisplay">Loading...</div>
    </div>

    <div class="main-content">
        <div id="tab-feed" class="tab-content active">
            <div class="card"><textarea id="postInput" placeholder="О чем думаете?"></textarea><button class="btn-main" onclick="publishPost()">Опубликовать</button></div>
            <div id="feedList"></div>
        </div>

        <div id="tab-messages" class="tab-content"><h3>Диалоги</h3><div id="dialogsList"></div></div>
        <div id="tab-users" class="tab-content"><h3>Найди друзей</h3><div id="usersList"></div></div>

        <div id="tab-chat" class="tab-content">
            <div class="card" style="display:flex; align-items:center; gap:15px;"><button onclick="showTab('messages')" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">←</button><strong id="chatPartnerName">...</strong></div>
            <div class="chat-area" id="chatArea"></div>
            <div style="display:flex; gap:10px;"><input type="text" id="chatInput" placeholder="Напишите другу..." onkeypress="if(event.key==='Enter') sendMessage()"><button class="btn-main" onclick="sendMessage()" style="width:70px;">➤</button></div>
        </div>

        <div id="tab-cust" class="tab-content">
            <div class="card">
                <h3>🎨 Кастомизация интерфейса</h3>
                <div style="margin-bottom:15px;">Цвет кнопок: <input type="color" id="custPrimary" oninput="applyCustomization()"></div>
                <div>Округлость: <input type="range" min="0" max="40" id="custRadius" oninput="applyCustomization()"></div>
                <button class="btn-main" onclick="resetCustomization()" style="margin-top:20px; background:#ef4444">Сбросить стиль</button>
            </div>
        </div>

        <div id="tab-prof" class="tab-content">
            <div class="card" style="text-align:center;">
                <img id="pPreview" src="" class="avatar" style="width:120px; height:120px; margin-bottom:20px;">
                <h2 id="pNameDisplay">...</h2>
                <input type="text" id="pNickInput" placeholder="Новое имя">
                <input type="text" id="pAvInput" placeholder="Ссылка на аватар (URL)">
                <input type="password" id="pAdminInput" placeholder="Код доступа">
                <button class="btn-main" onclick="updateProfile()">Сохранить профиль</button>
            </div>
        </div>

        <div id="tab-admin" class="tab-content">
            <div class="card" style="border: 2px solid #6366f1;">
                <h3 style="color:#818cf8">Панель BLEVDOZA</h3>
                <button class="btn-main" style="background:#ef4444; margin-bottom:10px;" onclick="adminClear('posts')">🗑️ Очистить все посты</button>
                <button class="btn-main" style="background:#ef4444;" onclick="adminClear('chats')">🗑️ Удалить все чаты</button>
                <textarea id="adminGlobalMsg" placeholder="Глобальное объявление..." style="margin-top:20px;"></textarea>
                <button class="btn-main" style="background:#6366f1;" onclick="adminBroadcast()">📢 Отправить всем</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, push, onChildAdded, set, onValue, remove } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRq5Vu9t2Dpmk",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "blvgramm",
            appId: "1:441925060827:web:07585974cd7427db98e4fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CORE ---
        let myId = localStorage.getItem('blv_uid_v3') || 'u' + Math.floor(Math.random()*1000000);
        localStorage.setItem('blv_uid_v3', myId);
        document.getElementById('myIdDisplay').innerText = "ID: " + myId;

        let me = JSON.parse(localStorage.getItem('blv_user_v3')) || {
            nick: 'User' + Math.floor(Math.random()*999),
            av: 'https://flaticon.com',
            isAdmin: false
        };

        if(me.isAdmin) document.getElementById('nb-admin').style.display = 'flex';
        const sync = () => set(ref(db, 'users/' + myId), { id: myId, nick: me.nick, av: me.av });
        sync();

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if(document.getElementById('nb-'+id)) document.getElementById('nb-'+id).classList.add('active');
        };

        // --- CUSTOMIZATION ---
        let cust = JSON.parse(localStorage.getItem('blv_cust_v3')) || { p: '#00d2ff', r: '20px' };
        window.applyCustomization = () => {
            cust.p = document.getElementById('custPrimary').value;
            cust.r = document.getElementById('custRadius').value + 'px';
            document.documentElement.style.setProperty('--primary', cust.p);
            document.documentElement.style.setProperty('--radius', cust.r);
            localStorage.setItem('blv_cust_v3', JSON.stringify(cust));
        };
        document.getElementById('custPrimary').value = cust.p;
        document.getElementById('custRadius').value = parseInt(cust.r);
        applyCustomization();
        window.resetCustomization = () => { localStorage.removeItem('blv_cust_v3'); location.reload(); };

        // --- PROFILE ---
        document.getElementById('pNameDisplay').innerText = me.nick;
        document.getElementById('pPreview').src = me.av;
        window.updateProfile = () => {
            const n = document.getElementById('pNickInput').value;
            const a = document.getElementById('pAvInput').value;
            const c = document.getElementById('pAdminInput').value;
            if(n) me.nick = n; if(a) me.av = a;
            if(c === "BLEVDOZA2004") me.isAdmin = true;
            localStorage.setItem('blv_user_v3', JSON.stringify(me));
            sync(); location.reload();
        };

        // --- FEED ---
        window.publishPost = () => {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            push(ref(db, 'posts'), { n: me.nick, av: me.av, t: t });
            document.getElementById('postInput').value = '';
        };
        onChildAdded(ref(db, 'posts'), (s) => {
            const p = s.val();
            const h = `<div class="card"><div style="display:flex;align-items:center;gap:15px;margin-bottom:12px;"><img src="${p.av}" class="avatar" style="width:40px;height:40px;"><strong>${p.n}</strong></div><div>${p.t}</div></div>`;
            document.getElementById('feedList').insertAdjacentHTML('afterbegin', h);
        });

        // --- USERS & CHAT ---
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('usersList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); if(u.id === myId) return;
                const d = document.createElement('div'); d.className = 'card'; d.style.cursor = 'pointer';
                d.innerHTML = `<img src="${u.av}" class="avatar" style="width:35px;height:35px;vertical-align:middle;margin-right:15px;"> <strong>${u.nick}</strong>`;
                d.onclick = () => openChat(u); list.appendChild(d);
            });
        });

        let activePartner = null;
        window.openChat = (u) => {
            activePartner = u; document.getElementById('chatPartnerName').innerText = u.nick;
            document.getElementById('chatArea').innerHTML = ''; showTab('chat');
            const cid = [myId, u.id].sort().join('_');
            onChildAdded(ref(db, 'chats/' + cid), (s) => {
                const m = s.val(); const d = document.createElement('div');
                d.className = `msg ${m.f === myId ? 'mine' : 'other'}`; d.innerText = m.t;
                document.getElementById('chatArea').appendChild(d);
                document.getElementById('chatArea').scrollTop = 9999;
            });
            set(ref(db, `dialogs/${myId}/${u.id}`), u);
        };

        window.sendMessage = () => {
            const i = document.getElementById('chatInput'); if(!i.value.trim() || !activePartner) return;
            const cid = [myId, activePartner.id].sort().join('_');
            push(ref(db, 'chats/' + cid), { f: myId, t: i.value }); i.value = '';
        };

        onValue(ref(db, `dialogs/${myId}`), (snap) => {
            const list = document.getElementById('dialogsList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); const d = document.createElement('div'); d.className = 'card'; d.style.cursor = 'pointer';
                d.innerHTML = `Диалог: <strong>${u.nick}</strong>`; d.onclick = () => openChat(u);
                list.appendChild(d);
            });
        });

        // --- ADMIN OPS ---
        window.adminClear = (path) => {
            if(confirm("Очистить всё в " + path + "?")) remove(ref(db, path)).then(() => location.reload());
        };
        window.adminBroadcast = () => {
            const t = document.getElementById('adminGlobalMsg').value;
            if(!t) return;
            push(ref(db, 'posts'), { n: "👑 SYSTEM", av: "https://flaticon.com", t: "📢 ВСЕМ: " + t });
            alert("Разослано!");
        };
    </script>
</body>
</html>
