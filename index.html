<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Ultra FIX</title>
    
    <!-- СТАБИЛЬНЫЙ FIREBASE (НЕ МЕНЯТЬ) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style id="dynamic-theme">
        :root { --primary: #58a074; --bg: #f5f6fa; --card: #ffffff; --radius: 25px; }
    </style>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .sidebar { width: 240px; background: #fff; border-right: 1px solid #eee; padding: 30px 15px; display: flex; flex-direction: column; gap: 8px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); text-align: center; margin-bottom: 30px; }
        .nav-btn { padding: 12px 15px; cursor: pointer; border-radius: 15px; border: none; background: none; font-weight: 600; text-align: left; transition: 0.2s; color: #444; }
        .nav-btn:hover { background: #f0f0f0; }
        .nav-btn.active { background: var(--primary); color: white; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: flex; justify-content: center; }
        .tab-content { display: none; width: 100%; max-width: 550px; flex-direction: column; }
        .tab-content.active { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; padding: 30px; border-radius: var(--radius); box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 15px; background: #f9f9f9; margin-bottom: 12px; outline: none; box-sizing: border-box; font-size: 15px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 18px; cursor: pointer; font-weight: 800; width: 100%; font-size: 14px; text-transform: uppercase; }
        .btn-main:active { transform: scale(0.98); }

        .chat-area { height: 350px; overflow-y: auto; background: #fdfdfd; padding: 15px; border-radius: 20px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #f0f0f0; border-bottom-left-radius: 4px; }
        
        .user-row { padding: 12px; border-radius: 15px; cursor: pointer; border-bottom: 1px solid #f5f5f5; text-align: left; }
        .user-row:hover { background: #f9f9f9; }
        #btn-admin { display: none; background: #6f42c1; color: white; margin-top: auto; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">BLVgramm</div>
        <button class="nav-btn active" id="nb-feed" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" id="nb-users" onclick="showTab('users')">🔍 Люди</button>
        <button class="nav-btn" id="nb-dialogs" onclick="showTab('dialogs')">💬 Сообщения</button>
        <button class="nav-btn" id="nb-cust" onclick="showTab('cust')">🎨 Тема</button>
        <button class="nav-btn" id="nb-prof" onclick="showTab('prof')">👤 Профиль</button>
        <button class="nav-btn" id="btn-admin" onclick="showTab('admin')">👑 Админка</button>
    </div>

    <div class="main-content">
        <!-- ЛЕНТА -->
        <div id="tab-feed" class="tab-content active">
            <div class="card" style="text-align:left;">
                <textarea id="postInput" placeholder="Что нового?"></textarea>
                <button class="btn-main" onclick="publishPost()">Опубликовать</button>
            </div>
            <div id="feedList"></div>
        </div>

        <!-- СПИСОК ЛЮДЕЙ -->
        <div id="tab-users" class="tab-content">
            <div class="card"><h3>Все пользователи</h3><div id="usersList"></div></div>
        </div>

        <!-- ДИАЛОГИ -->
        <div id="tab-dialogs" class="tab-content">
            <div class="card"><h3>Ваши чаты</h3><div id="dialogsList"></div></div>
        </div>

        <!-- ЛИЧНЫЙ ЧАТ -->
        <div id="tab-chat" class="tab-content">
            <div class="card">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                    <button onclick="showTab('dialogs')" style="border:none; background:none; cursor:pointer; font-size:20px;">⬅</button>
                    <strong id="chatPartnerName">...</strong>
                </div>
                <div class="chat-area" id="chatArea"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendPrivateMsg()">
                    <button class="btn-main" style="width:60px;" onclick="sendPrivateMsg()">➤</button>
                </div>
            </div>
        </div>

        <!-- ТЕМА -->
        <div id="tab-cust" class="tab-content">
            <div class="card">
                <h3>Кастомизация</h3>
                <p>Цвет темы: <input type="color" id="themeColor" onchange="updateTheme()"></p>
                <p>Скругление: <input type="range" min="0" max="40" id="themeRad" onchange="updateTheme()"></p>
                <button class="btn-main" style="background:#ef4444;" onclick="localStorage.clear(); location.reload();">Сбросить всё</button>
            </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="tab-prof" class="tab-content">
            <div class="card">
                <img id="pPreview" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); margin-bottom:15px;">
                <h2 id="pNameDisplay">Аноним</h2>
                <input type="text" id="pNickInput" placeholder="Ваш ник">
                <input type="text" id="pAvInput" placeholder="Ссылка на фото (URL)">
                <input type="password" id="pAdminCode" placeholder="Код BLEVDOZA">
                <button class="btn-main" onclick="saveProfile()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
            </div>
        </div>

        <!-- АДМИНКА -->
        <div id="tab-admin" class="tab-content">
            <div class="card" style="border: 2px solid #6f42c1;">
                <h3 style="color:#6f42c1">Admin Panel</h3>
                <button class="btn-main" style="background:#ef4444; margin-bottom:10px;" onclick="if(confirm('Удалить посты?')) db.ref('posts').remove()">🗑️ Очистить ленту</button>
                <button class="btn-main" style="background:#ef4444;" onclick="if(confirm('Стереть чаты?')) db.ref('chats').remove()">🗑️ Очистить чаты</button>
            </div>
        </div>
    </div>

    <script>
        // 1. ПОДКЛЮЧЕНИЕ (Твои данные)
        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRq5Vu9t2Dpmk",
            databaseURL: "https://firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. ДАННЫЕ ЮЗЕРА
        let myId = localStorage.getItem('blv_id') || 'u' + Date.now();
        localStorage.setItem('blv_id', myId);

        let me = JSON.parse(localStorage.getItem('blv_user_v6')) || {
            nick: 'Странник',
            av: 'https://flaticon.com',
            isAdmin: false
        };

        // 3. ФУНКЦИИ (ГЛОБАЛЬНЫЕ)
        window.showTab = function(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            const btn = document.getElementById('nb-' + (id === 'chat' ? 'dialogs' : id));
            if(btn) btn.classList.add('active');
        }

        window.saveProfile = function() {
            const n = document.getElementById('pNickInput').value;
            const a = document.getElementById('pAvInput').value;
            const c = document.getElementById('pAdminCode').value;

            if(n) me.nick = n;
            if(a) me.av = a;
            if(c === "BLEVDOZA2004") me.isAdmin = true;

            localStorage.setItem('blv_user_v6', JSON.stringify(me));
            db.ref('users/' + myId).set({id: myId, nick: me.nick, av: me.av});
            alert("Профиль обновлен!");
            location.reload();
        }

        window.publishPost = function() {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            db.ref('posts').push({ n: me.nick, av: me.av, t: t });
            document.getElementById('postInput').value = '';
        }

        window.updateTheme = function() {
            const c = document.getElementById('themeColor').value;
            const r = document.getElementById('themeRad').value + 'px';
            document.getElementById('dynamic-theme').innerHTML = `:root { --primary: ${c}; --bg: #f5f6fa; --card: #ffffff; --radius: ${r}; }`;
            localStorage.setItem('blv_theme', JSON.stringify({c, r}));
        }

        // --- ЛОГИКА ОНЛАЙН ---
        db.ref('posts').on('child_added', s => {
            const p = s.val();
            const h = `<div class="card" style="text-align:left; padding:15px;"><img src="${p.av}" style="width:30px;height:30px;border-radius:50%;vertical-align:middle;margin-right:10px;"><strong>${p.n}</strong><p>${p.t}</p></div>`;
            document.getElementById('feedList').insertAdjacentHTML('afterbegin', h);
        });

        db.ref('users').on('value', snap => {
            const list = document.getElementById('usersList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); if(u.id === myId) return;
                const d = document.createElement('div'); d.className = 'user-row';
                d.innerHTML = `<strong>${u.nick}</strong>`; d.onclick = () => openPrivateChat(u);
                list.appendChild(d);
            });
        });

        let activePartner = null;
        window.openPrivateChat = function(user) {
            activePartner = user;
            document.getElementById('chatPartnerName').innerText = user.nick;
            document.getElementById('chatArea').innerHTML = '';
            showTab('chat');
            const cid = [myId, user.id].sort().join('_');
            db.ref('chats/' + cid).off();
            db.ref('chats/' + cid).on('child_added', s => {
                const m = s.val(); const d = document.createElement('div');
                d.className = `msg ${m.f === myId ? 'mine' : 'other'}`; d.innerText = m.t;
                document.getElementById('chatArea').appendChild(d);
                document.getElementById('chatArea').scrollTop = 9999;
            });
            db.ref(`dialogs/${myId}/${user.id}`).set(user);
        }

        window.sendPrivateMsg = function() {
            const i = document.getElementById('chatInput'); if(!i.value.trim() || !activePartner) return;
            const cid = [myId, activePartner.id].sort().join('_');
            db.ref('chats/' + cid).push({ f: myId, t: i.value }); i.value = '';
        }

        db.ref(`dialogs/${myId}`).on('value', snap => {
            const list = document.getElementById('dialogsList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); const d = document.createElement('div'); d.className = 'user-row card';
                d.innerHTML = `Чат с <strong>${u.nick}</strong>`; d.onclick = () => openPrivateChat(u);
                list.appendChild(d);
            });
        });

        // ЗАПУСК
        const t = JSON.parse(localStorage.getItem('blv_theme'));
        if(t) { 
            document.getElementById('themeColor').value = t.c; 
            document.getElementById('themeRad').value = parseInt(t.r);
            updateTheme(); 
        }
        document.getElementById('pNameDisplay').innerText = me.nick;
        document.getElementById('pPreview').src = me.av;
        if(me.isAdmin) document.getElementById('btn-admin').style.display = 'block';
        db.ref('users/' + myId).set({id: myId, nick: me.nick, av: me.av});
    </script>
</body>
</html>
