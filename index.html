<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Pro Online</title>
    
    <!-- Стили -->
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Боковое меню */
        .sidebar { width: 280px; background: var(--card); border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 26px; font-weight: 900; color: var(--primary); margin-bottom: 25px; text-align: center; }
        .nav-btn { padding: 12px; margin: 5px 0; cursor: pointer; border-radius: 12px; border: none; background: none; font-weight: 600; text-align: left; transition: 0.2s; position: relative; }
        .nav-btn:hover { background: #f0f2f5; }
        .nav-btn.active { background: #e7f3ff; color: var(--primary); }

        /* Контентная часть */
        .main-content { flex: 1; display: flex; justify-content: center; position: relative; background: white; }
        .tab-content { display: none; width: 100%; max-width: 700px; height: 100%; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .tab-content.active { display: flex; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Карточки и элементы */
        .card { background: white; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 15px; }
        .avatar-sm { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #eee; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 15px; outline: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; }

        /* Чат */
        .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; margin-bottom: 10px; background: #f9f9f9; border-radius: 15px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }

        /* Поиск людей */
        .user-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .user-item:hover { background: #f0f2f5; border-color: #ddd; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">BLVgramm Pro</div>
        <button class="nav-btn active" id="btn-feed" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" id="btn-users" onclick="showTab('users')">🔍 Поиск людей</button>
        <button class="nav-btn" id="btn-chat" onclick="showTab('chat')" style="display:none;">💬 Чат с <span id="chatPartnerName">...</span></button>
        <button class="nav-btn" id="btn-prof" onclick="showTab('prof')">👤 Профиль</button>
        <div style="margin-top:auto; font-size:11px; color:#aaa; text-align:center;">Твой ID: <span id="myIdText">...</span></div>
    </div>

    <div class="main-content">
        <!-- Вкладка: ЛЕНТА -->
        <div id="tab-feed" class="tab-content active">
            <div class="card">
                <textarea id="postInput" placeholder="Что нового?"></textarea>
                <button class="btn-main" id="publishBtn">Опубликовать в ленту</button>
            </div>
            <div id="feedList"></div>
        </div>

        <!-- Вкладка: ПОИСК -->
        <div id="tab-users" class="tab-content">
            <h3>Найди собеседника</h3>
            <input type="text" id="searchInput" placeholder="Введите имя для поиска...">
            <div id="usersList"></div>
        </div>

        <!-- Вкладка: ЛИЧНЫЙ ЧАТ -->
        <div id="tab-chat" class="tab-content">
            <div class="chat-area" id="chatArea"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendPrivateMsg()">
                <button onclick="sendPrivateMsg()" style="width:50px; height:45px; background:var(--primary); color:white; border:none; border-radius:12px; cursor:pointer;">➤</button>
            </div>
        </div>

        <!-- Вкладка: ПРОФИЛЬ -->
        <div id="tab-prof" class="tab-content">
            <div class="card" style="text-align:center;">
                <img id="pPreview" src="" class="avatar-sm" style="width:100px; height:100px; margin-bottom:15px;">
                <h2 id="pNameDisplay">...</h2>
                <input type="text" id="pNickInput" placeholder="Новый ник">
                <input type="text" id="pAvInput" placeholder="Ссылка на фото (URL)">
                <button class="btn-main" id="saveProfBtn">Сохранить данные</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Версия 10.7.1) -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://gstatic.com";

        // Твои настройки Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRq5Vu9t2Dpmk",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "blvgramm",
            storageBucket: "blvgramm.firebasestorage.app",
            appId: "1:441925060827:web:07585974cd7427db98e4fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. Инициализация пользователя
        let myId = localStorage.getItem('blv_id_pro') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('blv_id_pro', myId);

        let me = JSON.parse(localStorage.getItem('blv_data_pro')) || {
            nick: 'Аноним' + Math.floor(Math.random()*999),
            av: 'https://flaticon.com'
        };

        document.getElementById('myIdText').innerText = myId;
        document.getElementById('pNameDisplay').innerText = me.nick;
        document.getElementById('pPreview').src = me.av;

        // Регистрация в глобальном списке пользователей
        function syncProfile() {
            set(ref(db, 'users/' + myId), { id: myId, nick: me.nick, av: me.av });
        }
        syncProfile();

        // 2. Навигация
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        };

        // 3. Поиск людей
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            snap.forEach(child => {
                const user = child.val();
                if (user.id === myId) return;
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `<img src="${user.av}" class="avatar-sm"> <strong>${user.nick}</strong>`;
                div.onclick = () => openPrivateChat(user);
                list.appendChild(div);
            });
        });

        // 4. Личные сообщения
        let activeChatPartner = null;
        let currentChatUnsubscribe = null;

        function openPrivateChat(user) {
            activeChatPartner = user;
            document.getElementById('chatPartnerName').innerText = user.nick;
            document.getElementById('btn-chat').style.display = 'block';
            document.getElementById('chatArea').innerHTML = '';
            showTab('chat');

            // ID чата всегда одинаковый для двух людей: ID1_ID2 (сортируем по алфавиту)
            const chatId = [myId, user.id].sort().join('_');
            
            // Слушаем новые сообщения именно в этом чате
            onChildAdded(ref(db, 'direct_messages/' + chatId), (s) => {
                const m = s.val();
                const div = document.createElement('div');
                div.className = `msg ${m.from === myId ? 'mine' : 'other'}`;
                div.innerText = m.text;
                document.getElementById('chatArea').appendChild(div);
                document.getElementById('chatArea').scrollTop = 99999;

                // Уведомление, если пришло сообщение в фоновом режиме
                if (m.from !== myId && document.hidden) {
                    new Notification("Новое сообщение", { body: `${user.nick}: ${m.text}`, icon: user.av });
                }
            });
        }

        window.sendPrivateMsg = () => {
            const inp = document.getElementById('chatInput');
            if (!inp.value.trim() || !activeChatPartner) return;
            const chatId = [myId, activeChatPartner.id].sort().join('_');
            push(ref(db, 'direct_messages/' + chatId), {
                from: myId,
                text: inp.value,
                time: Date.now()
            });
            inp.value = '';
        };

        // 5. Уведомления (запрос прав)
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        // 6. Профиль и Лента
        document.getElementById('saveProfBtn').onclick = () => {
            const n = document.getElementById('pNickInput').value;
            const a = document.getElementById('pAvInput').value;
            if(n) me.nick = n;
            if(a) me.av = a;
            localStorage.setItem('blv_data_pro', JSON.stringify(me));
            syncProfile();
            location.reload();
        };

        document.getElementById('publishBtn').onclick = () => {
            const text = document.getElementById('postInput').value;
            if(!text.trim()) return;
            push(ref(db, 'posts'), { n: me.nick, av: me.av, t: text, time: Date.now() });
            document.getElementById('postInput').value = '';
        };

        onChildAdded(ref(db, 'posts'), (s) => {
            const p = s.val();
            const html = `
                <div class="card">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <img src="${p.av}" class="avatar-sm">
                        <strong>${p.n}</strong>
                    </div>
                    <div>${p.t}</div>
                </div>`;
            document.getElementById('feedList').insertAdjacentHTML('afterbegin', html);
        });
    </script>
</body>
</html>
