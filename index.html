<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Ultra Online</title>
    
    <!-- Подключение Firebase (Надежная версия 8) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style id="custom-theme">
        :root {
            --primary: #28a745;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1c1e21;
            --radius: 12px;
            --sidebar-bg: #ffffff;
        }
    </style>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; 
            background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s;
        }

        /* Навигация */
        .sidebar { 
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid rgba(0,0,0,0.1); 
            padding: 20px; display: flex; flex-direction: column; 
        }
        .logo { font-size: 26px; font-weight: 900; color: var(--primary); margin-bottom: 25px; text-align: center; }
        .nav-btn { 
            padding: 12px; margin: 5px 0; cursor: pointer; border-radius: var(--radius); 
            border: none; background: none; font-weight: 600; text-align: left; transition: 0.2s; color: inherit;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.05); }
        .nav-btn.active { background: var(--primary); color: white; }

        /* Контент */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: flex; justify-content: center; }
        .tab-content { display: none; width: 100%; max-width: 650px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Элементы */
        .card { background: var(--card); padding: 20px; border-radius: var(--radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 10px; background: #eee; }
        
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: var(--radius); margin-bottom: 10px; box-sizing: border-box; font-size: 16px; outline: none; background: white; color: black; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: var(--radius); cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        
        /* Чат */
        .chat-area { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.03); padding: 15px; border-radius: var(--radius); display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: var(--card); border: 1px solid #ddd; border-bottom-left-radius: 2px; }

        #btn-admin { display: none; background: #6f42c1; color: white; margin-top: auto; }
        .user-card { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius); cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .user-card:hover { background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <!-- Меню -->
    <div class="sidebar">
        <div class="logo">BLVgramm</div>
        <button class="nav-btn active" id="btn-feed" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" id="btn-messages" onclick="showTab('messages')">💬 Сообщения</button>
        <button class="nav-btn" id="btn-users" onclick="showTab('users')">🔍 Найти людей</button>
        <button class="nav-btn" id="btn-cust" onclick="showTab('cust')">🎨 Тема</button>
        <button class="nav-btn" id="btn-prof" onclick="showTab('prof')">👤 Профиль</button>
        <button class="nav-btn" id="btn-admin" onclick="showTab('admin')">👑 Админка</button>
    </div>

    <!-- Основная часть -->
    <div class="main-content">
        
        <!-- ЛЕНТА -->
        <div id="tab-feed" class="tab-content active">
            <div class="card">
                <textarea id="postInput" placeholder="Что нового?"></textarea>
                <button class="btn-main" onclick="publishPost()">Опубликовать</button>
            </div>
            <div id="feedList"></div>
        </div>

        <!-- ДИАЛОГИ -->
        <div id="tab-messages" class="tab-content">
            <div class="card">
                <h3>Ваши переписки</h3>
                <div id="dialogsList"></div>
            </div>
        </div>

        <!-- ПОИСК ЛЮДЕЙ -->
        <div id="tab-users" class="tab-content">
            <div class="card">
                <h3>Все пользователи</h3>
                <div id="usersList"></div>
            </div>
        </div>

        <!-- ЧАТ -->
        <div id="tab-chat" class="tab-content">
            <div class="card">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                    <button onclick="showTab('messages')" style="background:none; border:none; cursor:pointer; font-size:20px;">⬅</button>
                    <strong id="chatPartnerName">...</strong>
                </div>
                <div class="chat-area" id="chatArea"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="chatInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" style="width:60px; background:var(--primary); color:white; border:none; border-radius:12px; cursor:pointer;">➤</button>
                </div>
            </div>
        </div>

        <!-- КАСТОМИЗАЦИЯ -->
        <div id="tab-cust" class="tab-content">
            <div class="card">
                <h3>🎨 Расширенная кастомизация</h3>
                <div style="display:grid; gap:10px;">
                    <label>Цвет кнопок (Primary): <input type="color" id="in-primary" onchange="updateCustom()"></label>
                    <label>Цвет фона сайта: <input type="color" id="in-bg" onchange="updateCustom()"></label>
                    <label>Цвет бокового меню: <input type="color" id="in-side" onchange="updateCustom()"></label>
                    <label>Цвет текста: <input type="color" id="in-text" onchange="updateCustom()"></label>
                    <label>Скругление (0-40px): <input type="range" min="0" max="40" id="in-radius" onchange="updateCustom()"></label>
                </div>
                <button class="btn-main" onclick="resetTheme()" style="margin-top:20px; background:#dc3545">Сбросить всё</button>
            </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="tab-prof" class="tab-content">
            <div class="card" style="text-align:center;">
                <img id="pPreview" src="" class="avatar">
                <h2 id="pNameDisplay">Загрузка...</h2>
                <input type="text" id="pNickInput" placeholder="Изменить ник">
                <input type="text" id="pAvInput" placeholder="Ссылка на фото аватарки">
                <input type="password" id="pAdminCode" placeholder="Код BLEVDOZA">
                <button class="btn-main" onclick="updateProfile()">Сохранить изменения</button>
            </div>
        </div>

        <!-- АДМИНКА -->
        <div id="tab-admin" class="tab-content">
            <div class="card" style="border: 2px solid #6f42c1;">
                <h3 style="color:#6f42c1">Панель BLEVDOZA</h3>
                <button class="btn-main" style="background:#dc3545; margin-bottom:10px;" onclick="adminClear('posts')">🗑️ Стереть все посты</button>
                <button class="btn-main" style="background:#dc3545;" onclick="adminClear('chats')">🗑️ Очистить все переписки</button>
            </div>
        </div>

    </div>

    <script>
        // --- 1. НАСТРОЙКИ ---
        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRq5Vu9t2Dpmk",
            databaseURL: "https://firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = localStorage.getItem('blv_uid') || 'u' + Date.now();
        localStorage.setItem('blv_uid', myId);

        let me = JSON.parse(localStorage.getItem('blv_user_v5')) || {
            nick: 'User' + Math.floor(Math.random() * 999),
            av: 'https://flaticon.com',
            isAdmin: false
        };

        // --- 2. НАВИГАЦИЯ ---
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            const nav = document.getElementById('btn-' + (id === 'chat' ? 'messages' : id));
            if(nav) nav.classList.add('active');
        }

        // --- 3. КАСТОМИЗАЦИЯ ---
        let theme = JSON.parse(localStorage.getItem('blv_theme')) || {
            primary: '#28a745', bg: '#f0f2f5', side: '#ffffff', text: '#1c1e21', radius: '12px'
        };

        function updateCustom() {
            theme.primary = document.getElementById('in-primary').value;
            theme.bg = document.getElementById('in-bg').value;
            theme.side = document.getElementById('in-side').value;
            theme.text = document.getElementById('in-text').value;
            theme.radius = document.getElementById('in-radius').value + 'px';
            applyTheme();
        }

        function applyTheme() {
            const root = document.getElementById('custom-theme');
            root.innerHTML = `
                :root {
                    --primary: ${theme.primary};
                    --bg: ${theme.bg};
                    --sidebar-bg: ${theme.side};
                    --text: ${theme.text};
                    --radius: ${theme.radius};
                    --card: ${theme.side};
                }
            `;
            localStorage.setItem('blv_theme', JSON.stringify(theme));
        }
        function resetTheme() { localStorage.removeItem('blv_theme'); location.reload(); }

        // --- 4. ПРОФИЛЬ ---
        function updateProfile() {
            const n = document.getElementById('pNickInput').value;
            const a = document.getElementById('pAvInput').value;
            const c = document.getElementById('pAdminCode').value;
            if(n) me.nick = n; if(a) me.av = a;
            if(c === "BLEVDOZA2004") me.isAdmin = true;
            localStorage.setItem('blv_user_v5', JSON.stringify(me));
            db.ref('users/' + myId).set({id: myId, nick: me.nick, av: me.av});
            location.reload();
        }

        // --- 5. ЛЕНТА ---
        function publishPost() {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            db.ref('posts').push({ n: me.nick, av: me.av, t: t, ts: Date.now() });
            document.getElementById('postInput').value = '';
        }

        db.ref('posts').on('child_added', s => {
            const p = s.val();
            const h = `<div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><img src="${p.av}" style="width:35px;height:35px;border-radius:50%"><strong>${p.n}</strong></div><p>${p.t}</p></div>`;
            document.getElementById('feedList').insertAdjacentHTML('afterbegin', h);
        });

        // --- 6. ЧАТ И ЛЮДИ ---
        let activePartner = null;

        function openChat(user) {
            activePartner = user;
            document.getElementById('chatPartnerName').innerText = user.nick;
            document.getElementById('chatArea').innerHTML = '';
            showTab('chat');
            const chatId = [myId, user.id].sort().join('_');
            db.ref('chats/' + chatId).off();
            db.ref('chats/' + chatId).on('child_added', s => {
                const m = s.val();
                const div = document.createElement('div');
                div.className = `msg ${m.f === myId ? 'mine' : 'other'}`;
                div.innerText = m.t;
                document.getElementById('chatArea').appendChild(div);
                document.getElementById('chatArea').scrollTop = 99999;
            });
            db.ref(`dialogs/${myId}/${user.id}`).set(user);
        }

        function sendMessage() {
            const i = document.getElementById('chatInput');
            if(!i.value.trim() || !activePartner) return;
            const chatId = [myId, activePartner.id].sort().join('_');
            db.ref('chats/' + chatId).push({ f: myId, t: i.value });
            i.value = '';
        }

        db.ref('users').on('value', snap => {
            const list = document.getElementById('usersList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); if(u.id === myId) return;
                const d = document.createElement('div'); d.className = 'user-card';
                d.innerHTML = `<img src="${u.av}" style="width:30px;height:30px;border-radius:50%"> <strong>${u.nick}</strong>`;
                d.onclick = () => openChat(u); list.appendChild(d);
            });
        });

        db.ref(`dialogs/${myId}`).on('value', snap => {
            const list = document.getElementById('dialogsList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); const d = document.createElement('div'); d.className = 'user-card card';
                d.innerHTML = `Чат с <strong>${u.nick}</strong>`; d.onclick = () => openChat(u);
                list.appendChild(d);
            });
        });

        // --- 7. АДМИНКА ---
        function adminClear(path) { if(confirm("Удалить всё?")) db.ref(path).remove(); }

        // Инициализация
        document.getElementById('pNameDisplay').innerText = me.nick;
        document.getElementById('pPreview').src = me.av;
        if(me.isAdmin) document.getElementById('btn-admin').style.display = 'block';
        db.ref('users/' + myId).set({id: myId, nick: me.nick, av: me.av});
        applyTheme();

        // Проставление значений в инпуты темы
        document.getElementById('in-primary').value = theme.primary;
        document.getElementById('in-bg').value = theme.bg;
        document.getElementById('in-side').value = theme.side;
        document.getElementById('in-text').value = theme.text;
        document.getElementById('in-radius').value = parseInt(theme.radius);
    </script>
</body>
</html>
