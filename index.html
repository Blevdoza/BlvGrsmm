<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Pro</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--card); border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); margin-bottom: 20px; cursor: default; }
        .nav-btn { padding: 12px; margin: 4px 0; cursor: pointer; border-radius: 10px; border: none; background: none; text-align: left; font-weight: 600; transition: 0.2s; }
        .nav-btn:hover { background: #f0f2f5; }
        .nav-btn.active { background: #e7f3ff; color: var(--primary); }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; background: white; }
        .tab-content { display: none; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .tab-content.active { display: flex; flex-direction: column; }

        /* Чат */
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 70%; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }
        
        /* Поиск и списки */
        .user-card { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 1px solid #eee; margin-bottom: 8px; }
        .user-card:hover { background: #f8f9fa; border-color: var(--primary); }
        .avatar-sm { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #eee; }

        .input-group { display: flex; gap: 10px; padding: 15px; border-top: 1px solid #eee; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 15px; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">BLVgramm Pro</div>
        <button class="nav-btn active" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" onclick="showTab('users')">🔍 Поиск людей</button>
        <button class="nav-btn" id="btn-chat-tab" onclick="showTab('chat')" style="display:none;">💬 Чат: <span id="currentChatName">...</span></button>
        <button class="nav-btn" onclick="showTab('prof')">👤 Профиль</button>
        <div style="margin-top:auto; font-size: 12px; color: #888;">Твой ID: <span id="myIdDisplay">...</span></div>
    </div>

    <div class="main-content">
        <!-- ЛЕНТА -->
        <div id="tab-feed" class="tab-content active">
            <div style="max-width: 600px; margin: 0 auto; width: 100%;">
                <textarea id="postInput" placeholder="Что нового?"></textarea>
                <button class="btn-send" id="publishBtn" style="height:45px; width:100%; margin-bottom:20px;">Опубликовать</button>
                <div id="feedList"></div>
            </div>
        </div>

        <!-- ПОИСК ЛЮДЕЙ -->
        <div id="tab-users" class="tab-content">
            <input type="text" id="searchPeople" placeholder="Поиск по нику..." style="margin-bottom: 20px;">
            <div id="usersList"></div>
        </div>

        <!-- ЛИЧНЫЙ ЧАТ -->
        <div id="tab-chat" class="tab-content">
            <div class="chat-container">
                <div class="chat-messages" id="chatArea"></div>
                <div class="input-group">
                    <input type="text" id="chatInput" placeholder="Напишите сообщение...">
                    <button class="btn-send" id="sendBtn">Отправить</button>
                </div>
            </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="tab-prof" class="tab-content">
            <div style="max-width: 400px; margin: 0 auto; text-align: center;">
                <img id="pPreview" src="" class="avatar-sm" style="width:100px; height:100px;">
                <h2 id="pNameDisplay">Загрузка...</h2>
                <input type="text" id="pNickInput" placeholder="Изменить ник">
                <input type="text" id="pAvInput" placeholder="URL аватарки">
                <button class="btn-send" id="saveProfBtn" style="height:45px; width:100%; margin-top:10px;">Сохранить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRq5Vu9t2Dpmk",
            authDomain: "blvgramm.firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "blvgramm",
            storageBucket: "blvgramm.firebasestorage.app",
            appId: "1:441925060827:web:07585974cd7427db98e4fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- ЛОГИКА ПОЛЬЗОВАТЕЛЯ ---
        let myId = localStorage.getItem('blv_id') || 'u' + Date.now();
        localStorage.setItem('blv_id', myId);

        let me = JSON.parse(localStorage.getItem('blv_user_v2')) || {
            nick: 'User_' + Math.floor(Math.random()*999),
            av: 'https://flaticon.com'
        };

        document.getElementById('myIdDisplay').innerText = myId;
        document.getElementById('pNameDisplay').innerText = me.nick;
        document.getElementById('pPreview').src = me.av;

        // Регистрация в базе для поиска
        function syncProfile() {
            set(ref(db, 'users/' + myId), { nick: me.nick, av: me.av, id: myId });
        }
        syncProfile();

        // --- УВЕДОМЛЕНИЯ ---
        if (Notification.permission !== "granted") Notification.requestPermission();

        function notify(title, body) {
            if (Notification.permission === "granted") {
                new Notification(title, { body: body, icon: me.av });
            }
        }

        // --- НАВИГАЦИЯ ---
        let currentChatPartner = null;

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if (id === 'chat') document.getElementById('btn-chat-tab').classList.add('active');
        };

        // --- ПОИСК ЛЮДЕЙ ---
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            snap.forEach(child => {
                const user = child.val();
                if (user.id === myId) return;
                const div = document.createElement('div');
                div.className = 'user-card';
                div.innerHTML = `<img src="${user.av}" class="avatar-sm"> <strong>${user.nick}</strong>`;
                div.onclick = () => startChat(user);
                list.appendChild(div);
            });
        });

        // --- ЛИЧНЫЕ ЧАТЫ ---
        function startChat(user) {
            currentChatPartner = user;
            document.getElementById('currentChatName').innerText = user.nick;
            document.getElementById('btn-chat-tab').style.display = 'block';
            document.getElementById('chatArea').innerHTML = '';
            
            showTab('chat');
            
            // Загрузка истории (ID чата = сумма ID двух людей по алфавиту)
            const chatId = [myId, user.id].sort().join('_');
            onChildAdded(ref(db, 'direct_messages/' + chatId), (s) => {
                const m = s.val();
                drawMessage(m);
                if (m.from !== myId) notify("Новое сообщение от " + user.nick, m.t);
            });
        }

        function drawMessage(m) {
            const div = document.createElement('div');
            div.className = `msg ${m.from === myId ? 'mine' : 'other'}`;
            div.innerText = m.t;
            document.getElementById('chatArea').appendChild(div);
            document.getElementById('chatArea').scrollTop = 10000;
        }

        document.getElementById('sendBtn').onclick = () => {
            const inp = document.getElementById('chatInput');
            if (!inp.value.trim() || !currentChatPartner) return;
            const chatId = [myId, currentChatPartner.id].sort().join('_');
            push(ref(db, 'direct_messages/' + chatId), { from: myId, t: inp.value, time: Date.now() });
            inp.value = '';
        };

        // --- ПРОФИЛЬ И ЛЕНТА ---
        document.getElementById('saveProfBtn').onclick = () => {
            const n = document.getElementById('pNickInput').value;
            const a = document.getElementById('pAvInput').value;
            if(n) me.nick = n; if(a) me.av = a;
            localStorage.setItem('blv_user_v2', JSON.stringify(me));
            syncProfile();
            location.reload();
        };

        document.getElementById('publishBtn').onclick = () => {
            const txt = document.getElementById('postInput').value;
            if(!txt.trim()) return;
            push(ref(db, 'posts'), { n: me.nick, av: me.av, t: txt });
            document.getElementById('postInput').value = '';
        };

        onChildAdded(ref(db, 'posts'), (s) => {
            const p = s.val();
            const html = `<div style="background:white; padding:15px; border-radius:15px; border:1px solid #ddd; margin-bottom:15px;">
                <div style="display:flex;align-items:center;gap:10px;"><img src="${p.av}" class="avatar-sm"><strong>${p.n}</strong></div>
                <p>${p.t}</p></div>`;
            document.getElementById('feedList').insertAdjacentHTML('afterbegin', html);
        });
    </script>
</body>
</html>
