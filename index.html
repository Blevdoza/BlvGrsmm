<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Ultra Online</title>
    
    <!-- Подключение Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root {
            --primary: #28a745;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1c1e21;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background: var(--bg); color: var(--text); overflow: hidden;
        }

        /* Навигация */
        .sidebar { 
            width: 260px; background: var(--card); border-right: 1px solid #ddd; 
            padding: 20px; display: flex; flex-direction: column; 
        }
        .logo { font-size: 26px; font-weight: 900; color: var(--primary); margin-bottom: 25px; text-align: center; }
        .nav-btn { 
            padding: 12px; margin: 5px 0; cursor: pointer; border-radius: 12px; 
            border: none; background: none; font-weight: 600; text-align: left; transition: 0.2s;
        }
        .nav-btn:hover { background: #f0f0f0; }
        .nav-btn.active { background: var(--primary); color: white; }

        /* Контент */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: flex; justify-content: center; }
        .tab-content { display: none; width: 100%; max-width: 650px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Элементы */
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 10px; background: #eee; }
        
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        .btn-main:active { transform: scale(0.98); }

        /* Чат */
        .chat-area { height: 400px; overflow-y: auto; background: #f8f9fa; padding: 15px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; position: relative; }
        .msg.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: white; border: 1px solid #ddd; border-bottom-left-radius: 2px; }

        #adminTag { display: none; background: #6f42c1; color: white; margin-top: auto; }
    </style>
</head>
<body>

    <!-- Меню -->
    <div class="sidebar">
        <div class="logo">BLVgramm</div>
        <button class="nav-btn active" id="btn-feed" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" id="btn-chat" onclick="showTab('chat')">💬 Общий чат</button>
        <button class="nav-btn" id="btn-prof" onclick="showTab('prof')">👤 Мой профиль</button>
        <button class="nav-btn" id="adminTag" onclick="showTab('admin')">👑 Админка</button>
    </div>

    <!-- Основная часть -->
    <div class="main-content">
        
        <!-- ВКЛАДКА: ЛЕНТА -->
        <div id="tab-feed" class="tab-content active">
            <div class="card">
                <textarea id="postInput" placeholder="Что нового?"></textarea>
                <button class="btn-main" onclick="publishPost()">Опубликовать</button>
            </div>
            <div id="feedList"></div>
        </div>

        <!-- ВКЛАДКА: ЧАТ -->
        <div id="tab-chat" class="tab-content">
            <div class="card">
                <div class="chat-area" id="chatArea"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="chatInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" style="width:60px; background:var(--primary); color:white; border:none; border-radius:12px; cursor:pointer;">➤</button>
                </div>
            </div>
        </div>

        <!-- ВКЛАДКА: ПРОФИЛЬ -->
        <div id="tab-prof" class="tab-content">
            <div class="card" style="text-align:center;">
                <img id="pPreview" src="https://flaticon.com" class="avatar">
                <h2 id="pNameDisplay">Аноним</h2>
                <hr style="opacity:0.2; margin: 20px 0;">
                <input type="text" id="pNickInput" placeholder="Изменить ник">
                <input type="text" id="pAvInput" placeholder="Ссылка на фото аватарки">
                <input type="password" id="pAdminCode" placeholder="Код BLEVDOZA">
                <button class="btn-main" onclick="updateProfile()">Сохранить изменения</button>
            </div>
        </div>

        <!-- ВКЛАДКА: АДМИНКА -->
        <div id="tab-admin" class="tab-content">
            <div class="card" style="border: 2px solid #6f42c1;">
                <h3 style="color:#6f42c1">Управление BLEVDOZA</h3>
                <button class="btn-main" style="background:#dc3545; margin-bottom:10px;" onclick="clearFeed()">🗑️ Удалить все посты</button>
                <textarea id="adminMsg" placeholder="Системное уведомление..."></textarea>
                <button class="btn-main" style="background:#6f42c1;" onclick="sendGlobalMsg()">📢 Объявить всем</button>
            </div>
        </div>

    </div>

    <script>
        // --- 1. НАСТРОЙКИ FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRqSVu9t2Dpmk",
            databaseURL: "https://firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ---
        let me = JSON.parse(localStorage.getItem('blv_final_v1')) || {
            nick: 'User' + Math.floor(Math.random() * 9999),
            av: 'https://flaticon.com',
            isAdmin: false
        };

        // --- 3. ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ТАБОВ ---
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + (tabId === 'chat' ? 'chat' : tabId === 'feed' ? 'feed' : tabId === 'prof' ? 'prof' : 'admin')).classList.add('active');
        }

        // --- 4. ПРОФИЛЬ ---
        function updateProfile() {
            const newNick = document.getElementById('pNickInput').value;
            const newAv = document.getElementById('pAvInput').value;
            const code = document.getElementById('pAdminCode').value;

            if (newNick) me.nick = newNick;
            if (newAv) me.av = newAv;
            if (code === "BLEVDOZA2004") me.isAdmin = true;

            localStorage.setItem('blv_final_v1', JSON.stringify(me));
            alert("Профиль обновлен!");
            location.reload(); // Перезагрузка для применения
        }

        // --- 5. ОНЛАЙН ЧАТ ---
        function sendMessage() {
            const inp = document.getElementById('chatInput');
            const text = inp.value.trim();
            if (!text) return;

            db.ref('messages').push({
                n: me.nick,
                t: text,
                time: Date.now()
            });
            inp.value = '';
        }

        db.ref('messages').limitToLast(50).on('child_added', (snap) => {
            const m = snap.val();
            const area = document.getElementById('chatArea');
            const isMine = m.n === me.nick;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isMine ? 'mine' : 'other'}`;
            msgDiv.innerHTML = `<b>${m.n}</b><br>${m.t}`;
            
            area.appendChild(msgDiv);
            area.scrollTop = area.scrollHeight;
        });

        // --- 6. ОНЛАЙН ЛЕНТА ---
        function publishPost() {
            const txt = document.getElementById('postInput').value.trim();
            if (!txt) return;

            db.ref('posts').push({
                n: me.nick,
                a: me.av,
                t: txt,
                time: Date.now()
            });
            document.getElementById('postInput').value = '';
        }

        db.ref('posts').on('value', (snap) => {
            const list = document.getElementById('feedList');
            list.innerHTML = '';
            const data = snap.val();
            if (data) {
                Object.values(data).reverse().forEach(p => {
                    list.innerHTML += `
                        <div class="card" style="text-align:left;">
                            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                                <img src="${p.a}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                                <b>${p.n}</b>
                            </div>
                            <div>${p.t}</div>
                        </div>`;
                });
            }
        });

        // --- 7. АДМИНКА ---
        function clearFeed() { if(confirm("Удалить все посты?")) db.ref('posts').remove(); }
        function sendGlobalMsg() {
            const t = document.getElementById('adminMsg').value;
            if(t) db.ref('messages').push({ n: '📢 СИСТЕМА', t: t });
            document.getElementById('adminMsg').value = '';
        }

        // --- ПРИ ЗАГРУЗКЕ ---
        window.onload = () => {
            document.getElementById('pNameDisplay').innerText = me.nick;
            document.getElementById('pPreview').src = me.av;
            document.getElementById('pNickInput').value = me.nick;
            document.getElementById('pAvInput').value = me.av;
            
            if (me.isAdmin) {
                document.getElementById('adminTag').style.display = 'block';
            }
        };
    </script>
</body>
</html>
