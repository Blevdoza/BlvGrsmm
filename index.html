<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Ultra FIX</title>
    
       <!-- СТАБИЛЬНЫЙ FIREBASE (Используем совместимую версию 8.x) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style id="dynamic-theme">
        :root { --primary: #58a074; --bg: #f5f6fa; --card: #ffffff; --radius: 25px; }
    </style>
    <!-- Остальные стили из вашего кода остаются без изменений -->
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .sidebar { width: 240px; background: #fff; border-right: 1px solid #eee; padding: 30px 15px; display: flex; flex-direction: column; gap: 8px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); text-align: center; margin-bottom: 30px; }
        .nav-btn { padding: 12px 15px; cursor: pointer; border-radius: 15px; border: none; background: none; font-weight: 600; text-align: left; transition: 0.2s; color: #444; }
        .nav-btn:hover { background: #f0f0f0; }
        .nav-btn.active { background: var(--primary); color: white; }
        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: flex; justify-content: center; }
        .tab-content { display: none; width: 100%; max-width: 550px; flex-direction: column; }
        .tab-content.active { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; padding: 30px; border-radius: var(--radius); box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid #eee; border-radius: 15px; background: #f9f9f9; margin-bottom: 12px; outline: none; box-sizing: border-box; font-size: 15px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 18px; cursor: pointer; font-weight: 800; width: 100%; font-size: 14px; text-transform: uppercase; }
        .chat-area { height: 350px; overflow-y: auto; background: #fdfdfd; padding: 15px; border-radius: 20px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 14px; }
        .msg.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #f0f0f0; border-bottom-left-radius: 4px; }
        .user-row { padding: 12px; border-radius: 15px; cursor: pointer; border-bottom: 1px solid #f5f5f5; text-align: left; display: flex; align-items: center; gap: 10px; }
        .user-row:hover { background: #f9f9f9; }
        #btn-admin { display: none; background: #6f42c1; color: white; margin-top: auto; }
    </style>
</head>
<body>

    <!-- Разметка (sidebar и main-content) остается как в вашем примере -->
    <div class="sidebar">
        <div class="logo">BLVgramm</div>
        <button class="nav-btn active" id="nb-feed" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" id="nb-users" onclick="showTab('users')">🔍 Люди</button>
        <button class="nav-btn" id="nb-dialogs" onclick="showTab('dialogs')">💬 Сообщения</button>
        <button class="nav-btn" id="nb-cust" onclick="showTab('cust')">🎨 Тема</button>
        <button class="nav-btn" id="nb-prof" onclick="showTab('prof')">👤 Профиль</button>
        <button class="nav-btn" id="btn-admin" onclick="showTab('admin')">👑 Админка</button>
    </div>

    <div class="main-content">
        <div id="tab-feed" class="tab-content active">
            <div class="card" style="text-align:left;">
                <textarea id="postInput" placeholder="Что нового?"></textarea>
                <button class="btn-main" onclick="publishPost()">Опубликовать</button>
            </div>
            <div id="feedList"></div>
        </div>
        <div id="tab-users" class="tab-content"><div class="card"><h3>Все пользователи</h3><div id="usersList"></div></div></div>
        <div id="tab-dialogs" class="tab-content"><div class="card"><h3>Ваши чаты</h3><div id="dialogsList"></div></div></div>
        <div id="tab-chat" class="tab-content">
            <div class="card">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                    <button onclick="showTab('dialogs')" style="border:none; background:none; cursor:pointer; font-size:20px;">⬅</button>
                    <strong id="chatPartnerName">...</strong>
                </div>
                <div class="chat-area" id="chatArea"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendPrivateMsg()">
                    <button class="btn-main" style="width:60px;" onclick="sendPrivateMsg()">➤</button>
                </div>
            </div>
        </div>
        <div id="tab-cust" class="tab-content">
            <div class="card">
                <h3>Кастомизация</h3>
                <p>Цвет темы: <input type="color" id="themeColor" onchange="updateTheme()"></p>
                <p>Скругление: <input type="range" min="0" max="40" id="themeRad" onchange="updateTheme()"></p>
                <button class="btn-main" style="background:#ef4444;" onclick="localStorage.clear(); location.reload();">Сбросить всё</button>
            </div>
        </div>
        <div id="tab-prof" class="tab-content">
            <div class="card">
                <img id="pPreview" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--primary); margin-bottom:15px; object-fit: cover;">
                <h2 id="pNameDisplay">Аноним</h2>
                <input type="text" id="pNickInput" placeholder="Ваш ник">
                <input type="text" id="pAvInput" placeholder="Ссылка на фото (URL)">
                <input type="password" id="pAdminCode" placeholder="Код BLEVDOZA">
                <button class="btn-main" onclick="saveProfile()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
            </div>
        </div>
        <div id="tab-admin" class="tab-content">
            <div class="card" style="border: 2px solid #6f42c1;">
                <h3 style="color:#6f42c1">Admin Panel</h3>
                <button class="btn-main" style="background:#ef4444; margin-bottom:10px;" onclick="if(confirm('Удалить посты?')) db.ref('posts').remove()">🗑️ Очистить ленту</button>
                <button class="btn-main" style="background:#ef4444;" onclick="if(confirm('Стереть чаты?')) db.ref('messages').remove()">🗑️ Очистить чаты</button>
            </div>
        </div>
    </div>

    <script>
        // 1. ИНИЦИАЛИЗАЦИЯ (Замените данные на свои из Firebase Console)
        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRq5Vu9t2Dpmk",
            databaseURL: "https://firebaseio.com" // Сюда вставьте ваш URL
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. СОСТОЯНИЕ
        let myId = localStorage.getItem('blv_id') || 'u' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('blv_id', myId);

        let me = JSON.parse(localStorage.getItem('blv_user_v6')) || {
            nick: 'Странник',
            av: 'https://flaticon.com',
            isAdmin: false
        };

        let currentChatPartner = null;

        // 3. ФУНКЦИИ ИНТЕРФЕЙСА
        window.showTab = function(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            const btn = document.getElementById('nb-' + (id === 'chat' ? 'dialogs' : id));
            if(btn) btn.classList.add('active');
        };

        function updateUI() {
            document.getElementById('pNameDisplay').innerText = me.nick;
            document.getElementById('pPreview').src = me.av;
            document.getElementById('pNickInput').value = me.nick;
            document.getElementById('pAvInput').value = me.av;
            document.getElementById('btn-admin').style.display = me.isAdmin ? 'block' : 'none';
            db.ref('users/' + myId).set({ nick: me.nick, av: me.av });
        }

        window.saveProfile = function() {
            me.nick = document.getElementById('pNickInput').value || 'Аноним';
            me.av = document.getElementById('pAvInput').value || 'https://flaticon.com';
            if (document.getElementById('pAdminCode').value === "BLEVDOZA") me.isAdmin = true;
            localStorage.setItem('blv_user_v6', JSON.stringify(me));
            updateUI();
            alert("Готово!");
        };

        window.updateTheme = function() {
            const color = document.getElementById('themeColor').value;
            const rad = document.getElementById('themeRad').value;
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--radius', rad + 'px');
        };

        // 4. ЛЕНТА
        window.publishPost = function() {
            const txt = document.getElementById('postInput').value;
            if(!txt.trim()) return;
            db.ref('posts').push({ uid: myId, nick: me.nick, av: me.av, text: txt, time: Date.now() });
            document.getElementById('postInput').value = '';
        };

        db.ref('posts').on('value', s => {
            const list = document.getElementById('feedList');
            list.innerHTML = '';
            const posts = [];
            s.forEach(c => { posts.unshift(c.val()) });
            posts.forEach(p => {
                list.innerHTML += `<div class="card" style="text-align:left;">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                        <img src="${p.av}" style="width:35px;height:35px;border-radius:50%;object-fit:cover;">
                        <strong>${p.nick}</strong>
                    </div>
                    <div>${p.text}</div>
                </div>`;
            });
        });

        // 5. ПОЛЬЗОВАТЕЛИ И ЧАТ
        db.ref('users').on('value', s => {
            const uList = document.getElementById('usersList');
            const dList = document.getElementById('dialogsList');
            uList.innerHTML = ''; dList.innerHTML = '';
            s.forEach(c => {
                if(c.key === myId) return;
                const u = c.val();
                const html = `<div class="user-row" onclick="openChat('${c.key}', '${u.nick}')">
                    <img src="${u.av}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;">
                    <span>${u.nick}</span>
                </div>`;
                uList.innerHTML += html; dList.innerHTML += html;
            });
        });

        window.openChat = function(id, name) {
            currentChatPartner = id;
            document.getElementById('chatPartnerName').innerText = name;
            showTab('chat');
            const chatId = myId < id ? myId + id : id + myId;
            db.ref('messages/' + chatId).off();
            db.ref('messages/' + chatId).on('value', s => {
                const area = document.getElementById('chatArea');
                area.innerHTML = '';
                s.forEach(c => {
                    const m = c.val();
                    const side = m.sender === myId ? 'mine' : 'other';
                    area.innerHTML += `<div class="msg ${side}">${m.text}</div>`;
                });
                area.scrollTop = area.scrollHeight;
            });
        };

        window.sendPrivateMsg = function() {
            const inp = document.getElementById('chatInput');
            if(!inp.value.trim() || !currentChatPartner) return;
            const chatId = myId < currentChatPartner ? myId + currentChatPartner : currentChatPartner + myId;
            db.ref('messages/' + chatId).push({ sender: myId, text: inp.value });
            inp.value = '';
        };

        updateUI();
    </script>
</body>
</html>
