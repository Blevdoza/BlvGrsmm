<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Ultra Online</title>
    
    <!-- ИСПРАВЛЕНО: Правильное подключение Firebase -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root {
            --primary: #28a745;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1c1e21;
            --radius: 12px;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background: var(--bg); color: var(--text); overflow: hidden;
        }

        .sidebar { 
            width: 260px; background: var(--card); border-right: 1px solid #ddd; 
            padding: 20px; display: flex; flex-direction: column; 
        }
        .logo { font-size: 26px; font-weight: 900; color: var(--primary); margin-bottom: 25px; text-align: center; }
        .nav-btn { 
            padding: 12px; margin: 5px 0; cursor: pointer; border-radius: var(--radius); 
            border: none; background: none; font-weight: 600; text-align: left; transition: 0.2s;
        }
        .nav-btn:hover { background: #f0f0f0; }
        .nav-btn.active { background: var(--primary); color: white; }

        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: flex; justify-content: center; }
        .tab-content { display: none; width: 100%; max-width: 650px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 10px; background: #eee; }
        
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: var(--radius); margin-bottom: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: var(--radius); cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        
        .chat-area { height: 400px; overflow-y: auto; background: #f8f9fa; padding: 15px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; position: relative; }
        .msg.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: white; border: 1px solid #ddd; border-bottom-left-radius: 2px; }

        #btn-admin { display: none; background: #6f42c1; color: white; margin-top: auto; }
        .user-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-card:hover { background: #f9f9f9; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">BLVgramm</div>
        <button class="nav-btn active" id="btn-feed" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" id="btn-messages" onclick="showTab('messages')">💬 Сообщения</button>
        <button class="nav-btn" id="btn-users" onclick="showTab('users')">🔍 Друзья</button>
        <button class="nav-btn" id="btn-cust" onclick="showTab('cust')">🎨 Тема</button>
        <button class="nav-btn" id="btn-prof" onclick="showTab('prof')">👤 Профиль</button>
        <button class="nav-btn" id="btn-admin" onclick="showTab('admin')">👑 Админка</button>
    </div>

    <div class="main-content">
        <!-- ЛЕНТА -->
        <div id="tab-feed" class="tab-content active">
            <div class="card">
                <textarea id="postInput" placeholder="Что нового?"></textarea>
                <button class="btn-main" onclick="publishPost()">Опубликовать</button>
            </div>
            <div id="feedList"></div>
        </div>

        <!-- СПИСОК ДИАЛОГОВ -->
        <div id="tab-messages" class="tab-content">
            <div class="card"><h3>Ваши чаты</h3><div id="dialogsList"></div></div>
        </div>

        <!-- ПОИСК ДРУЗЕЙ -->
        <div id="tab-users" class="tab-content">
            <div class="card"><h3>Найти людей</h3><div id="usersList"></div></div>
        </div>

        <!-- ЛИЧНЫЙ ЧАТ -->
        <div id="tab-chat" class="tab-content">
            <div class="card">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                    <button onclick="showTab('messages')" style="border:none; background:none; cursor:pointer; font-size:20px;">⬅</button>
                    <strong id="chatPartnerName">Чат</strong>
                </div>
                <div class="chat-area" id="chatArea"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" style="width:60px; background:var(--primary); color:white; border:none; border-radius:12px; cursor:pointer;">➤</button>
                </div>
            </div>
        </div>

        <!-- КАСТОМИЗАЦИЯ -->
        <div id="tab-cust" class="tab-content">
            <div class="card">
                <h3>🎨 Кастомизация</h3>
                <p>Цвет темы: <input type="color" id="custColor" onchange="applyCust()"></p>
                <p>Скругление: <input type="range" min="0" max="30" id="custRad" onchange="applyCust()"></p>
            </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="tab-prof" class="tab-content">
            <div class="card" style="text-align:center;">
                <img id="pPreview" src="" class="avatar">
                <h2 id="pNameDisplay">Аноним</h2>
                <input type="text" id="pNickInput" placeholder="Новый ник">
                <input type="text" id="pAvInput" placeholder="Ссылка на фото">
                <input type="password" id="pAdminCode" placeholder="Код BLEVDOZA">
                <button class="btn-main" onclick="updateProfile()">Сохранить изменения</button>
            </div>
        </div>

        <!-- АДМИНКА -->
        <div id="tab-admin" class="tab-content">
            <div class="card" style="border: 2px solid #6f42c1;">
                <h3 style="color:#6f42c1">BLEVDOZA Admin</h3>
                <button class="btn-main" style="background:#dc3545; margin-bottom:10px;" onclick="db.ref('posts').remove()">🗑️ Удалить все посты</button>
                <button class="btn-main" style="background:#dc3545;" onclick="db.ref('chats').remove()">🗑️ Удалить все чаты</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRq5Vu9t2Dpmk",
            databaseURL: "https://blvgramm-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = localStorage.getItem('blv_uid') || 'u' + Date.now();
        localStorage.setItem('blv_uid', myId);

        let me = JSON.parse(localStorage.getItem('blv_user')) || {
            nick: 'User' + Math.floor(Math.random() * 999),
            av: 'https://flaticon.com',
            isAdmin: false
        };

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('btn-' + (id === 'chat' ? 'messages' : id)).classList.add('active');
        }

        function updateProfile() {
            const n = document.getElementById('pNickInput').value;
            const a = document.getElementById('pAvInput').value;
            const c = document.getElementById('pAdminCode').value;
            if(n) me.nick = n; if(a) me.av = a;
            if(c === "BLEVDOZA2004") me.isAdmin = true;
            localStorage.setItem('blv_user', JSON.stringify(me));
            db.ref('users/' + myId).set({id: myId, nick: me.nick, av: me.av});
            location.reload();
        }

        // --- ЛЕНТА ---
        function publishPost() {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            db.ref('posts').push({ n: me.nick, av: me.av, t: t });
            document.getElementById('postInput').value = '';
        }

        db.ref('posts').on('child_added', s => {
            const p = s.val();
            const h = `<div class="card"><strong>${p.n}:</strong><p>${p.t}</p></div>`;
            document.getElementById('feedList').insertAdjacentHTML('afterbegin', h);
        });

        // --- ЧАТ И ДРУЗЬЯ ---
        let activePartner = null;
        function openChat(u) {
            activePartner = u; document.getElementById('chatPartnerName').innerText = u.nick;
            document.getElementById('chatArea').innerHTML = ''; showTab('chat');
            const cid = [myId, u.id].sort().join('_');
            db.ref('chats/' + cid).off();
            db.ref('chats/' + cid).on('child_added', s => {
                const m = s.val(); const d = document.createElement('div');
                d.className = `msg ${m.f === myId ? 'mine' : 'other'}`; d.innerText = m.t;
                document.getElementById('chatArea').appendChild(d);
                document.getElementById('chatArea').scrollTop = 9999;
            });
            db.ref(`dialogs/${myId}/${u.id}`).set(u);
        }

        function sendMessage() {
            const i = document.getElementById('chatInput'); if(!i.value.trim()) return;
            const cid = [myId, activePartner.id].sort().join('_');
            db.ref('chats/' + cid).push({ f: myId, t: i.value }); i.value = '';
        }

        db.ref('users').on('value', snap => {
            const list = document.getElementById('usersList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); if(u.id === myId) return;
                const d = document.createElement('div'); d.className = 'user-card';
                d.innerHTML = `<strong>${u.nick}</strong>`; d.onclick = () => openChat(u);
                list.appendChild(d);
            });
        });

        db.ref(`dialogs/${myId}`).on('value', snap => {
            const list = document.getElementById('dialogsList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); const d = document.createElement('div'); d.className = 'user-card';
                d.innerHTML = `Чат с <strong>${u.nick}</strong>`; d.onclick = () => openChat(u);
                list.appendChild(d);
            });
        });

        // --- КАСТОМ ---
        function applyCust() {
            const c = document.getElementById('custColor').value;
            const r = document.getElementById('custRad').value + 'px';
            document.documentElement.style.setProperty('--primary', c);
            document.documentElement.style.setProperty('--radius', r);
        }

        // Запуск
        document.getElementById('pNameDisplay').innerText = me.nick;
        document.getElementById('pPreview').src = me.av;
        if(me.isAdmin) document.getElementById('btn-admin').style.display = 'block';
        db.ref('users/' + myId).set({id: myId, nick: me.nick, av: me.av});
    </script>
</body>
</html>
