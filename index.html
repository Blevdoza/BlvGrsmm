<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Ultra</title>
    
    <!-- Самое важное: рабочие ссылки на Firebase (Версия 8) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style id="theme-style">
        :root {
            --primary: #58a074; /* Тот самый зеленый со скрина */
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #1c1e21;
            --radius: 25px;
        }
    </style>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Боковая панель */
        .sidebar { width: 240px; background: #ffffff; border-right: 1px solid #eee; padding: 30px 15px; display: flex; flex-direction: column; gap: 10px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); margin-bottom: 30px; text-align: center; }
        .nav-btn { padding: 14px; cursor: pointer; border-radius: 18px; border: none; background: none; font-weight: 600; text-align: left; display: flex; align-items: center; gap: 12px; color: #555; transition: 0.2s; }
        .nav-btn:hover { background: #f0f0f0; }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(88, 160, 116, 0.3); }

        /* Контент */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; }
        .tab-content { display: none; width: 100%; max-width: 550px; flex-direction: column; }
        .tab-content.active { display: flex; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Карточки (как на скриншоте) */
        .card { background: white; padding: 40px; border-radius: var(--radius); box-shadow: 0 10px 40px rgba(0,0,0,0.03); margin-bottom: 20px; text-align: center; border: 1px solid #f0f0f0; }
        .avatar-box { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--primary); margin: 0 auto 25px; padding: 5px; position: relative; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #eee; }
        
        input, textarea { width: 100%; padding: 16px; border: 1px solid #f0f0f0; border-radius: 15px; background: #fafafa; font-size: 15px; outline: none; margin-bottom: 15px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); background: #fff; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 20px; cursor: pointer; font-weight: 800; width: 100%; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.3s; }
        .btn-main:hover { filter: brightness(1.05); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(88, 160, 116, 0.3); }

        /* Чат */
        .chat-area { height: 400px; overflow-y: auto; background: #f9f9f9; padding: 20px; border-radius: 20px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #fff; border: 1px solid #eee; border-bottom-left-radius: 4px; }

        .user-row { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 18px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; border: 1px solid transparent; }
        .user-row:hover { background: #f8faf9; border-color: #eee; }

        #admin-btn { display: none; color: #6f42c1; margin-top: auto; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">BLVgramm</div>
        <button class="nav-btn active" id="nb-feed" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" id="nb-users" onclick="showTab('users')">🔍 Найти людей</button>
        <button class="nav-btn" id="nb-messages" onclick="showTab('messages')">💬 Сообщения</button>
        <button class="nav-btn" id="nb-cust" onclick="showTab('cust')">🎨 Кастомизация</button>
        <button class="nav-btn" id="nb-prof" onclick="showTab('prof')">👤 Профиль</button>
        <button class="nav-btn" id="admin-btn" onclick="showTab('admin')">👑 Админка</button>
    </div>

    <div class="main-content">
        <!-- ЛЕНТА -->
        <div id="tab-feed" class="tab-content active">
            <div class="card" style="text-align: left;">
                <textarea id="postInput" placeholder="Что у вас нового?"></textarea>
                <button class="btn-main" onclick="publishPost()">Опубликовать пост</button>
            </div>
            <div id="feedList"></div>
        </div>

        <!-- ПОИСК -->
        <div id="tab-users" class="tab-content">
            <div class="card"><h3>Все пользователи</h3><div id="usersList"></div></div>
        </div>

        <!-- ДИАЛОГИ -->
        <div id="tab-messages" class="tab-content">
            <div class="card"><h3>Ваши переписки</h3><div id="dialogsList"></div></div>
        </div>

        <!-- ЧАТ -->
        <div id="tab-chat" class="tab-content">
            <div class="card">
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                    <button onclick="showTab('messages')" style="border:none; background:none; cursor:pointer; font-size:24px;">⬅</button>
                    <strong id="chatPartnerName">...</strong>
                </div>
                <div class="chat-area" id="chatArea"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chatInput" placeholder="Ваше сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="btn-main" style="width:70px; padding:0;" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>

        <!-- ПРОФИЛЬ (КАК НА СКРИНШОТЕ) -->
        <div id="tab-prof" class="tab-content active">
            <div class="card">
                <div class="avatar-box"><img id="pPreview" src="" class="avatar-img"></div>
                <h2 id="pNameDisplay">Аноним</h2>
                <input type="text" id="pNickInput" placeholder="Введите ваш ник">
                <input type="text" id="pAvInput" placeholder="Ссылка на фото">
                <input type="password" id="pAdminCode" placeholder="Код администратора">
                <button class="btn-main" onclick="saveProfile()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
            </div>
        </div>

        <!-- КАСТОМИЗАЦИЯ -->
        <div id="tab-cust" class="tab-content">
            <div class="card">
                <h3>Цветовая схема</h3>
                <input type="color" id="colorPicker" onchange="applyCustom()" style="height:60px; cursor:pointer;">
                <p>Скругление углов</p>
                <input type="range" min="0" max="40" id="radiusPicker" onchange="applyCustom()" style="cursor:pointer;">
                <button class="btn-main" style="background:#dc3545; margin-top:20px;" onclick="localStorage.removeItem('blv_theme'); location.reload();">Сбросить всё</button>
            </div>
        </div>

        <!-- АДМИНКА -->
        <div id="tab-admin" class="tab-content">
            <div class="card" style="border: 2px solid #6f42c1;">
                <h3 style="color:#6f42c1">Панель управления</h3>
                <button class="btn-main" style="background:#dc3545; margin-bottom:12px;" onclick="if(confirm('Удалить всё?')) db.ref('posts').remove();">🗑️ Очистить ленту</button>
                <button class="btn-main" style="background:#dc3545;" onclick="if(confirm('Удалить чаты?')) db.ref('chats').remove();">🗑️ Очистить диалоги</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRq5Vu9t2Dpmk",
            databaseURL: "https://firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = localStorage.getItem('blv_uid') || 'u' + Date.now();
        localStorage.setItem('blv_uid', myId);

        let me = JSON.parse(localStorage.getItem('blv_user')) || {
            nick: 'Аноним',
            av: 'https://flaticon.com',
            isAdmin: false
        };

        // --- 2. CORE FUNCTIONS ---
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            const nav = document.getElementById('nb-' + (id === 'chat' ? 'messages' : id));
            if(nav) nav.classList.add('active');
        }

        // --- 3. PROFILE (ИСПРАВЛЕНО) ---
        function saveProfile() {
            const nickInp = document.getElementById('pNickInput').value;
            const avInp = document.getElementById('pAvInput').value;
            const codeInp = document.getElementById('pAdminCode').value;

            if(nickInp) me.nick = nickInp;
            if(avInp) me.av = avInp;
            if(codeInp === "BLEVDOZA2004") me.isAdmin = true;

            localStorage.setItem('blv_user', JSON.stringify(me));
            db.ref('users/' + myId).set({id: myId, nick: me.nick, av: me.av});
            
            alert("Профиль успешно обновлен!");
            location.reload();
        }

        // --- 4. FEED ---
        function publishPost() {
            const txt = document.getElementById('postInput').value;
            if(!txt.trim()) return;
            db.ref('posts').push({ n: me.nick, av: me.av, t: txt, time: Date.now() });
            document.getElementById('postInput').value = '';
        }

        db.ref('posts').on('child_added', s => {
            const p = s.val();
            const h = `<div class="card" style="text-align:left; padding:20px;">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                    <img src="${p.av}" class="avatar-img" style="width:35px;height:35px;">
                    <strong>${p.n}</strong>
                </div>
                <div style="font-size:15px; line-height:1.5;">${p.t}</div>
            </div>`;
            document.getElementById('feedList').insertAdjacentHTML('afterbegin', h);
        });

        // --- 5. PRIVATE MESSAGES ---
        let activePartner = null;
        function openChat(user) {
            activePartner = user;
            document.getElementById('chatPartnerName').innerText = user.nick;
            document.getElementById('chatArea').innerHTML = '';
            showTab('chat');
            const cid = [myId, user.id].sort().join('_');
            db.ref('chats/' + cid).off();
            db.ref('chats/' + cid).on('child_added', s => {
                const m = s.val();
                const d = document.createElement('div');
                d.className = `msg ${m.f === myId ? 'mine' : 'other'}`;
                d.innerText = m.t;
                document.getElementById('chatArea').appendChild(d);
                document.getElementById('chatArea').scrollTop = 999999;
            });
            db.ref(`dialogs/${myId}/${user.id}`).set(user);
        }

        function sendMessage() {
            const i = document.getElementById('chatInput');
            if(!i.value.trim() || !activePartner) return;
            const cid = [myId, activePartner.id].sort().join('_');
            db.ref('chats/' + cid).push({ f: myId, t: i.value });
            i.value = '';
        }

        // --- 6. LISTS ---
        db.ref('users').on('value', snap => {
            const list = document.getElementById('usersList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); if(u.id === myId) return;
                const d = document.createElement('div'); d.className = 'user-row';
                d.innerHTML = `<img src="${u.av}" class="avatar-img" style="width:40px;height:40px;"> <strong>${u.nick}</strong>`;
                d.onclick = () => openChat(u); list.appendChild(d);
            });
        });

        db.ref(`dialogs/${myId}`).on('value', snap => {
            const list = document.getElementById('dialogsList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); const d = document.createElement('div'); d.className = 'user-row card';
                d.style.padding = '15px'; d.style.textAlign = 'left';
                d.innerHTML = `Чат с <strong>${u.nick}</strong>`; d.onclick = () => openChat(u);
                list.appendChild(d);
            });
        });

        // --- 7. THEME & INIT ---
        function applyCustom() {
            const c = document.getElementById('colorPicker').value;
            const r = document.getElementById('radiusPicker').value + 'px';
            document.getElementById('theme-style').innerHTML = `:root { --primary: ${c}; --bg: #f5f6fa; --card: #ffffff; --text: #1c1e21; --radius: ${r}; }`;
            localStorage.setItem('blv_theme', JSON.stringify({c, r}));
        }

        const saved = JSON.parse(localStorage.getItem('blv_theme'));
        if(saved) {
            document.getElementById('colorPicker').value = saved.c;
            document.getElementById('radiusPicker').value = parseInt(saved.r);
            applyCustom();
        }

        document.getElementById('pNameDisplay').innerText = me.nick;
        document.getElementById('pPreview').src = me.av;
        if(me.isAdmin) document.getElementById('admin-btn').style.display = 'flex';
        db.ref('users/' + myId).set({id: myId, nick: me.nick, av: me.av});

        // При первом запуске показываем профиль, как на твоем скриншоте
        showTab('prof');
    </script>
</body>
</html>
