<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm Ultra Custom</title>
    
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --radius: 15px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); margin-bottom: 20px; text-align: center; }
        .nav-btn { padding: 12px; margin: 4px 0; cursor: pointer; border-radius: var(--radius); border: none; background: none; font-weight: 600; text-align: left; transition: 0.2s; }
        .nav-btn.active { background: var(--primary); color: white; }
        .main-content { flex: 1; overflow-y: auto; display: flex; justify-content: center; background: transparent; }
        .tab-content { display: none; width: 100%; max-width: 700px; padding: 20px; box-sizing: border-box; flex-direction: column; }
        .tab-content.active { display: flex; }
        .card { background: var(--card); padding: 20px; border-radius: var(--radius); border: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: var(--radius); margin-bottom: 10px; outline: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: var(--radius); cursor: pointer; font-weight: bold; width: 100%; }
        .chat-area { flex: 1; height: 400px; overflow-y: auto; background: rgba(0,0,0,0.02); padding: 15px; border-radius: var(--radius); display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 15px; border-radius: var(--radius); max-width: 75%; }
        .msg.mine { align-self: flex-end; background: var(--primary); color: white; }
        .msg.other { align-self: flex-start; background: #e4e6eb; color: black; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">BLVgramm</div>
        <button class="nav-btn active" id="nb-feed" onclick="showTab('feed')">🏠 Лента</button>
        <button class="nav-btn" id="nb-messages" onclick="showTab('messages')">💬 Сообщения</button>
        <button class="nav-btn" id="nb-users" onclick="showTab('users')">🔍 Люди</button>
        <button class="nav-btn" id="nb-cust" onclick="showTab('cust')">🎨 Тема</button>
        <button class="nav-btn" id="nb-prof" onclick="showTab('prof')">👤 Профиль</button>
    </div>

    <div class="main-content">
        <div id="tab-feed" class="tab-content active">
            <div class="card"><textarea id="postInput" placeholder="Что нового?"></textarea><button class="btn-main" onclick="publishPost()">Опубликовать</button></div>
            <div id="feedList"></div>
        </div>

        <div id="tab-messages" class="tab-content"><h3>Ваши диалоги</h3><div id="dialogsList"></div></div>
        <div id="tab-users" class="tab-content"><h3>Все пользователи</h3><div id="usersList"></div></div>

        <div id="tab-chat" class="tab-content">
            <div class="card" style="display:flex; align-items:center; gap:10px;"><button onclick="showTab('messages')" style="background:none; border:none; cursor:pointer;">⬅</button><strong id="chatPartnerName">...</strong></div>
            <div class="chat-area" id="chatArea"></div>
            <div style="display:flex; gap:8px;"><input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()"><button class="btn-main" onclick="sendMessage()" style="width:60px;">➤</button></div>
        </div>

        <div id="tab-cust" class="tab-content">
            <div class="card">
                <h3>🎨 Кастомизация</h3>
                <div>Цвет темы: <input type="color" id="custPrimary" onchange="applyCustomization()"></div>
                <div style="margin-top:10px;">Скругление: <input type="range" min="0" max="30" id="custRadius" onchange="applyCustomization()"></div>
                <button class="btn-main" onclick="resetCustomization()" style="margin-top:15px; background:#dc3545">Сбросить</button>
            </div>
        </div>

        <div id="tab-prof" class="tab-content">
            <div class="card" style="text-align:center;">
                <img id="pPreview" src="" class="avatar" style="width:100px; height:100px;">
                <h2 id="pNameDisplay">...</h2>
                <input type="text" id="pNickInput" placeholder="Ник"><input type="text" id="pAvInput" placeholder="URL аватара">
                <button class="btn-main" onclick="updateProfile()">Сохранить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyC9ncz649ddqf5nwh-lsXXRq5Vu9t2Dpmk",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "blvgramm",
            appId: "1:441925060827:web:07585974cd7427db98e4fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId = localStorage.getItem('blv_uid') || 'u' + Date.now();
        localStorage.setItem('blv_uid', myId);

        let me = JSON.parse(localStorage.getItem('blv_user')) || { nick: 'User'+Math.floor(Math.random()*999), av: 'https://flaticon.com' };
        set(ref(db, 'users/' + myId), { id: myId, nick: me.nick, av: me.av });

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if(document.getElementById('nb-'+id)) document.getElementById('nb-'+id).classList.add('active');
        };

        window.applyCustomization = () => {
            const p = document.getElementById('custPrimary').value;
            const r = document.getElementById('custRadius').value + 'px';
            document.documentElement.style.setProperty('--primary', p);
            document.documentElement.style.setProperty('--radius', r);
            localStorage.setItem('blv_cust', JSON.stringify({primary: p, radius: r}));
        };

        window.updateProfile = () => {
            const n = document.getElementById('pNickInput').value;
            const a = document.getElementById('pAvInput').value;
            if(n) me.nick = n; if(a) me.av = a;
            localStorage.setItem('blv_user', JSON.stringify(me));
            location.reload();
        };

        window.publishPost = () => {
            const t = document.getElementById('postInput').value;
            if(!t.trim()) return;
            push(ref(db, 'posts'), { n: me.nick, av: me.av, t: t });
            document.getElementById('postInput').value = '';
        };

        onChildAdded(ref(db, 'posts'), (s) => {
            const p = s.val();
            const h = `<div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><img src="${p.av}" class="avatar" style="width:35px;height:35px;"><strong>${p.n}</strong></div><div>${p.t}</div></div>`;
            document.getElementById('feedList').insertAdjacentHTML('afterbegin', h);
        });

        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('usersList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); if(u.id === myId) return;
                const div = document.createElement('div'); div.className = 'card'; div.style.cursor = 'pointer';
                div.innerHTML = `<img src="${u.av}" class="avatar" style="width:30px;height:30px;"> ${u.nick}`;
                div.onclick = () => openChat(u); list.appendChild(div);
            });
        });

        let activePartner = null;
        window.openChat = (u) => {
            activePartner = u; document.getElementById('chatPartnerName').innerText = u.nick;
            document.getElementById('chatArea').innerHTML = ''; showTab('chat');
            const cid = [myId, u.id].sort().join('_');
            onChildAdded(ref(db, 'chats/' + cid), (s) => {
                const m = s.val(); const d = document.createElement('div');
                d.className = `msg ${m.f === myId ? 'mine' : 'other'}`; d.innerText = m.t;
                document.getElementById('chatArea').appendChild(d);
                document.getElementById('chatArea').scrollTop = 9999;
            });
            set(ref(db, `dialogs/${myId}/${u.id}`), u);
        };

        window.sendMessage = () => {
            const i = document.getElementById('chatInput'); if(!i.value.trim() || !activePartner) return;
            const cid = [myId, activePartner.id].sort().join('_');
            push(ref(db, 'chats/' + cid), { f: myId, t: i.value }); i.value = '';
        };

        onValue(ref(db, `dialogs/${myId}`), (snap) => {
            const list = document.getElementById('dialogsList'); list.innerHTML = '';
            snap.forEach(c => {
                const u = c.val(); const div = document.createElement('div'); div.className = 'card'; div.style.cursor = 'pointer';
                div.innerHTML = `Чат с <strong>${u.nick}</strong>`; div.onclick = () => openChat(u);
                list.appendChild(div);
            });
        });

        document.getElementById('pNameDisplay').innerText = me.nick;
        document.getElementById('pPreview').src = me.av;
    </script>
</body>
</html>
