<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVgramm</title>
    <style>
        /* --- ПЕРЕМЕННЫЕ ТЕМ (КАСТОМИЗАЦИЯ) --- */
        :root {
            --primary: #0084ff;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1c1e21;
            --accent: #e7f3ff;
            --radius: 16px;
        }

        /* ЗЕЛЕНАЯ ТЕМА */
        body.theme-green {
            --primary: #28a745;
            --bg: #eafaf1;
            --card-bg: #ffffff;
            --text: #155724;
            --accent: #d4edda;
        }

        /* ТЕМНАЯ ТЕМА */
        body.theme-dark {
            --primary: #0084ff;
            --bg: #18191a;
            --card-bg: #242526;
            --text: #e4e6eb;
            --accent: #3a3b3c;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: var(--bg); 
            color: var(--text);
            transition: 0.3s;
        }
        
        /* --- БОКОВАЯ ПАНЕЛЬ --- */
        .sidebar { 
            width: 260px; 
            background: var(--card-bg); 
            border-right: 1px solid rgba(0,0,0,0.1); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }
        
        .logo { 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--primary); 
            margin-bottom: 35px; 
            letter-spacing: -1px;
        }

        .nav-btn { 
            padding: 14px 18px; 
            margin: 4px 0; 
            cursor: pointer; 
            border-radius: 12px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            transition: 0.2s; 
        }
        .nav-btn:hover { background: var(--accent); transform: translateX(5px); }
        .nav-btn.active { background: var(--primary); color: white; }

        /* --- КОНТЕНТ --- */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: flex; justify-content: center; }
        .tab-content { display: none; width: 100%; max-width: 650px; animation: slideUp 0.4s ease; }
        .active-tab { display: block; }
        
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: var(--radius); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
            border: 1px solid rgba(0,0,0,0.05);
        }

        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid var(--accent); 
            border-radius: 10px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            font-size: 16px; 
            background: var(--card-bg);
            color: var(--text);
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }

        /* ЧАТ */
        .chat-window { height: 450px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; background: var(--bg); border-radius: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: var(--card-bg); color: var(--text); border-bottom-left-radius: 4px; }
        .msg.admin { align-self: flex-start; background: #6f42c1; color: white; font-weight: bold; border-left: 5px solid #ffd700; }

        #secretBtn { display: none; background: #6f42c1; color: white; margin-top: auto; }
    </style>
</head>
<body id="mainBody">

    <div class="sidebar">
        <div class="logo">📱 BLVgramm</div>
        <div class="nav-btn active" onclick="switchTab('feed', this)">🏠 Лента</div>
        <div class="nav-btn" onclick="switchTab('msgs', this)">💬 Чаты</div>
        <div class="nav-btn" onclick="switchTab('prof', this)">⚙️ Настройки</div>
        <div class="nav-btn" id="secretBtn" onclick="switchTab('secret', this)">👑 Админка</div>
    </div>

    <div class="main-content">
        <!-- ЛЕНТА -->
        <div id="tab-feed" class="tab-content active-tab">
            <div class="card">
                <textarea id="postInput" placeholder="О чем ты думаешь?"></textarea>
                <button onclick="addPost()">Опубликовать пост</button>
            </div>
            <div id="feedList"></div>
        </div>

        <!-- ЧАТЫ -->
        <div id="tab-msgs" class="tab-content">
            <div class="card">
                <div style="font-weight:bold; margin-bottom:10px;">🤖 Поддержка BLVgramm</div>
                <div id="chatBox" class="chat-window"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chatInput" placeholder="Напишите сообщение..." style="margin:0;">
                    <button onclick="sendMsg()" style="width:70px;">Отпр.</button>
                </div>
            </div>
        </div>

        <!-- НАСТРОЙКИ И ПРОФИЛЬ -->
        <div id="tab-prof" class="tab-content">
            <div class="card">
                <div style="text-align:center; margin-bottom:20px;">
                    <div id="dispAvatar" style="font-size:80px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));">👤</div>
                    <h2 id="dispNick" style="margin:10px 0;">Аноним</h2>
                </div>
                
                <label>Ваш ник:</label>
                <input type="text" id="inNick" placeholder="Введите имя...">
                
                <label>Ваш эмодзи:</label>
                <input type="text" id="inEmoji" placeholder="Например, ⚡">

                <label>Тема оформления:</label>
                <select id="themeSelect" onchange="changeTheme()">
                    <option value="default">Стандартная (Голубая)</option>
                    <option value="green">Зеленая (Green Life)</option>
                    <option value="dark">Темная (Night)</option>
                </select>

                <label>Секретный код:</label>
                <input type="password" id="inPass" placeholder="Код доступа...">
                
                <button onclick="saveProfile()" style="background: var(--primary);">Применить изменения</button>
            </div>
        </div>

        <!-- АДМИНКА -->
        <div id="tab-secret" class="tab-content">
            <div class="card" style="border: 3px solid #6f42c1;">
                <h3 style="color:#6f42c1">👑 Панель BLEVDOZA</h3>
                <p>Вы можете отправить системное сообщение в чат:</p>
                <textarea id="adminText" placeholder="Текст ответа..."></textarea>
                <button onclick="sendAdmin()" style="background:#6f42c1;">Отправить в чат</button>
            </div>
        </div>
    </div>

    <script>
        let user = { nick: 'Аноним', emoji: '👤', theme: 'default' };
        let posts = [];

        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active-tab');
            el.classList.add('active');
        }

        // СМЕНА ТЕМЫ
        function changeTheme() {
            const theme = document.getElementById('themeSelect').value;
            const body = document.getElementById('mainBody');
            body.className = ''; // Сброс
            if(theme !== 'default') body.classList.add('theme-' + theme);
            user.theme = theme;
        }

        // СОХРАНЕНИЕ ПРОФИЛЯ
        function saveProfile() {
            const n = document.getElementById('inNick').value;
            const e = document.getElementById('inEmoji').value;
            const p = document.getElementById('inPass').value;

            if(n) user.nick = n;
            if(e) user.emoji = e;
            
            if(p === "BLEVDOZA2004") {
                document.getElementById('secretBtn').style.display = 'flex';
                alert("👑 Права администратора получены!");
            }

            document.getElementById('dispNick').innerText = user.nick;
            document.getElementById('dispAvatar').innerText = user.emoji;
            alert("Настройки обновлены!");
        }

        // ЛЕНТА ПОСТОВ
        function addPost() {
            const val = document.getElementById('postInput').value;
            if(!val.trim()) return;
            posts.unshift({ author: user.nick, avatar: user.emoji, text: val, likes: 0, id: Date.now() });
            document.getElementById('postInput').value = '';
            renderFeed();
        }

        function renderFeed() {
            document.getElementById('feedList').innerHTML = posts.map(p => `
                <div class="card" style="animation: fadeIn 0.3s">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <span style="font-size:24px;">${p.avatar}</span>
                        <b style="font-size:18px;">${p.author}</b>
                    </div>
                    <div style="font-size:16px; line-height:1.5;">${p.text}</div>
                    <div style="margin-top:15px; border-top:1px solid var(--accent); padding-top:10px;">
                        <button style="width:auto; background:none; color:var(--primary); box-shadow:none; padding:5px 10px;" onclick="like(${p.id})">❤️ Лайков: ${p.likes}</button>
                    </div>
                </div>
            `).join('');
        }

        function like(id) {
            const p = posts.find(x => x.id === id);
            p.likes++;
            renderFeed();
        }

        // МЕССЕНДЖЕР
        function sendMsg() {
            const inp = document.getElementById('chatInput');
            if(!inp.value.trim()) return;
            addMsg(inp.value, 'user');
            
            // Имитация ответа
            setTimeout(() => {
                const replies = ["Интересно!", "Я записал это в базу данных.", "BLVgramm работает стабильно!", "Хорошего дня, " + user.nick + "!"];
                addMsg(replies[Math.floor(Math.random()*replies.length)], 'ai');
            }, 1000);
            inp.value = '';
        }

        function sendAdmin() {
            const txt = document.getElementById('adminText').value;
            if(!txt.trim()) return;
            addMsg("[SYSTEM]: " + txt, 'admin');
            document.getElementById('adminText').value = '';
            alert("Отправлено!");
        }

        function addMsg(txt, type) {
            const box = document.getElementById('chatBox');
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.innerText = txt;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
